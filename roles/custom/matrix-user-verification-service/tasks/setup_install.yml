---

- name: "Ensure Matrix User Verification Service paths exist"
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: '0750'
    owner: "{{ matrix_user_name }}"
    group: "{{ matrix_group_name }}"
  with_items:
    - {path: "{{ matrix_user_verification_service_config_path }}", when: true}
    - {path: "{{ matrix_user_verification_service_container_src_files_path }}", when: "{{ matrix_user_verification_service_container_image_self_build }}"}
  when: item.when | bool

- name: Ensure Matrix User Verification Service image is pulled
  community.docker.docker_image_pull:
    name: "{{ matrix_user_verification_service_container_image }}"
    pull: always
  register: matrix_user_verification_service_container_image_pull_result
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: matrix_user_verification_service_container_image_pull_result is not failed
  when: "not matrix_user_verification_service_container_image_self_build | bool"

- name: Ensure Matrix User Verification Service repository is present when self-building
  ansible.builtin.git:
    repo: "{{ matrix_user_verification_service_container_image_self_build_repo }}"
    dest: "{{ matrix_user_verification_service_container_src_files_path }}"
    version: "{{ matrix_user_verification_service_container_image_self_build_branch }}"
    force: "yes"
  become: true
  become_user: "{{ matrix_user_name }}"
  register: matrix_user_verification_service_git_pull_results
  when: "matrix_user_verification_service_container_image_self_build | bool"

- name: Ensure Matrix User Verification Service image is built
  community.docker.docker_image_build:
    name: "{{ matrix_user_verification_service_container_image }}"
    dockerfile: Dockerfile
    path: "{{ matrix_user_verification_service_container_src_files_path }}"
    pull: true
    rebuild: "{{ 'always' if matrix_user_verification_service_git_pull_results.changed | bool else 'never' }}"
  when: "matrix_user_verification_service_container_image_self_build | bool"
  register: matrix_user_verification_service_container_image_build_result

- name: Ensure Matrix User Verification Service env file installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/.env.j2"
    dest: "{{ matrix_user_verification_service_config_env_file }}"
    owner: "{{ matrix_user_name }}"
    group: "{{ matrix_group_name }}"
    mode: '0644'
  register: matrix_user_verification_service_config_result

- name: Ensure matrix-user-verification-service container network is created
  when: matrix_user_verification_service_container_network != 'host'
  community.general.docker_network:
    enable_ipv6: "{{ devture_systemd_docker_base_ipv6_enabled }}"
    name: "{{ matrix_user_verification_service_container_network }}"
    driver: bridge
    driver_options: "{{ devture_systemd_docker_base_container_networks_driver_options }}"

- name: Ensure matrix-user-verification-service.service installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/matrix-user-verification-service.service.j2"
    dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ matrix_user_verification_service_systemd_service_name }}"
    mode: '0644'
  register: matrix_user_verification_service_systemd_service_result

- name: Determine whether Matrix User Verification Service needs a restart
  ansible.builtin.set_fact:
    matrix_user_verification_service_restart_necessary: >-
      {{
        matrix_user_verification_service_config_result.changed | default(false)
        or matrix_user_verification_service_systemd_service_result.changed | default(false)
        or matrix_user_verification_service_container_image_pull_result.changed | default(false)
        or matrix_user_verification_service_container_image_build_result.changed | default(false)
      }}
