---
# mautrix-gvoice is a Matrix <-> Google Voice bridge
# Project source code URL: https://github.com/mautrix/gvoice

matrix_bridge_mautrix_gvoice_enabled: true

matrix_bridge_mautrix_gvoice_container_image_self_build: false
matrix_bridge_mautrix_gvoice_container_image_self_build_repo: "https://github.com/mautrix/gvoice.git"
matrix_bridge_mautrix_gvoice_container_image_self_build_branch: "{{ 'main' if matrix_bridge_mautrix_gvoice_version == 'latest' else matrix_bridge_mautrix_gvoice_version }}"

# renovate: datasource=docker depName=dock.mau.dev/mautrix/gvoice
matrix_bridge_mautrix_gvoice_version: v0.2605.0

# See: https://mau.dev/mautrix/gvoice/container_registry
matrix_bridge_mautrix_gvoice_container_image: "{{ matrix_bridge_mautrix_gvoice_container_image_registry_prefix }}mautrix/gvoice:{{ matrix_bridge_mautrix_gvoice_version }}"
matrix_bridge_mautrix_gvoice_container_image_registry_prefix: "{{ 'localhost/' if matrix_bridge_mautrix_gvoice_container_image_self_build else matrix_bridge_mautrix_gvoice_container_image_registry_prefix_upstream }}"
matrix_bridge_mautrix_gvoice_container_image_registry_prefix_upstream: "{{ matrix_bridge_mautrix_gvoice_container_image_registry_prefix_upstream_default }}"
matrix_bridge_mautrix_gvoice_container_image_registry_prefix_upstream_default: "dock.mau.dev/"

matrix_bridge_mautrix_gvoice_base_path: "{{ matrix_base_data_path }}/mautrix-gvoice"
matrix_bridge_mautrix_gvoice_config_path: "{{ matrix_bridge_mautrix_gvoice_base_path }}/config"
matrix_bridge_mautrix_gvoice_data_path: "{{ matrix_bridge_mautrix_gvoice_base_path }}/data"
matrix_bridge_mautrix_gvoice_container_src_files_path: "{{ matrix_bridge_mautrix_gvoice_base_path }}/docker-src"

matrix_bridge_mautrix_gvoice_homeserver_address: ""
# Whether asynchronous uploads via MSC2246 should be enabled for media.
# Requires a homeserver that supports MSC2246 (https://github.com/matrix-org/matrix-spec-proposals/pull/2246).
matrix_bridge_mautrix_gvoice_homeserver_async_media: false
matrix_bridge_mautrix_gvoice_homeserver_domain: "{{ matrix_domain }}"
matrix_bridge_mautrix_gvoice_appservice_address: "http://matrix-mautrix-gvoice:8080"

# Scheme of the bridge's public address (see `matrix_bridge_mautrix_gvoice_bridge_public_address`).
matrix_bridge_mautrix_gvoice_scheme: https

# The public base URL at which this bridge's HTTP API is reachable from outside (when exposed).
# Used for the provisioning API's external-server (OpenID) flow and for public media links.
matrix_bridge_mautrix_gvoice_bridge_public_address: "{{ (matrix_bridge_mautrix_gvoice_scheme + '://' + matrix_bridge_mautrix_gvoice_exposure_hostname + matrix_bridge_mautrix_gvoice_exposure_path_prefix) if matrix_bridge_mautrix_gvoice_exposure_enabled else '' }}"

matrix_bridge_mautrix_gvoice_msc4190_enabled: "{{ matrix_bridges_msc4190_enabled }}"
matrix_bridge_mautrix_gvoice_self_sign_enabled: "{{ matrix_bridges_self_sign_enabled }}"

matrix_bridge_mautrix_gvoice_backfill_enabled: true
matrix_bridge_mautrix_gvoice_backfill_max_initial_messages: 50
matrix_bridge_mautrix_gvoice_backfill_max_catchup_messages: 500
matrix_bridge_mautrix_gvoice_backfill_unread_hours_threshold: 720
matrix_bridge_mautrix_gvoice_backfill_threads_max_initial_messages: 50

matrix_bridge_mautrix_gvoice_command_prefix: "!gv"

matrix_bridge_mautrix_gvoice_container_network: ""

matrix_bridge_mautrix_gvoice_container_additional_networks: "{{ matrix_bridge_mautrix_gvoice_container_additional_networks_auto + matrix_bridge_mautrix_gvoice_container_additional_networks_custom }}"
matrix_bridge_mautrix_gvoice_container_additional_networks_auto: []
matrix_bridge_mautrix_gvoice_container_additional_networks_custom: []

# matrix_bridge_mautrix_gvoice_container_labels_traefik_enabled controls whether labels to assist a Traefik reverse-proxy will be attached to the container.
# See `../templates/labels.j2` for details.
#
# To inject your own other container labels, see `matrix_bridge_mautrix_gvoice_container_labels_additional_labels`.
matrix_bridge_mautrix_gvoice_container_labels_traefik_enabled: true
matrix_bridge_mautrix_gvoice_container_labels_traefik_docker_network: "{{ matrix_bridge_mautrix_gvoice_container_network }}"
matrix_bridge_mautrix_gvoice_container_labels_traefik_entrypoints: web-secure
matrix_bridge_mautrix_gvoice_container_labels_traefik_tls_certResolver: default  # noqa var-naming

# Controls whether labels will be added that expose mautrix-gvoice' metrics
matrix_bridge_mautrix_gvoice_container_labels_metrics_enabled: "{{ matrix_bridge_mautrix_gvoice_metrics_enabled and matrix_bridge_mautrix_gvoice_metrics_proxying_enabled }}"
matrix_bridge_mautrix_gvoice_container_labels_metrics_traefik_rule: "Host(`{{ matrix_bridge_mautrix_gvoice_metrics_proxying_hostname }}`) && PathPrefix(`{{ matrix_bridge_mautrix_gvoice_metrics_proxying_path_prefix }}`)"
matrix_bridge_mautrix_gvoice_container_labels_metrics_traefik_priority: 0
matrix_bridge_mautrix_gvoice_container_labels_metrics_traefik_entrypoints: "{{ matrix_bridge_mautrix_gvoice_container_labels_traefik_entrypoints }}"
matrix_bridge_mautrix_gvoice_container_labels_metrics_traefik_tls: "{{ matrix_bridge_mautrix_gvoice_container_labels_metrics_traefik_entrypoints != 'web' }}"
matrix_bridge_mautrix_gvoice_container_labels_metrics_traefik_tls_certResolver: "{{ matrix_bridge_mautrix_gvoice_container_labels_traefik_tls_certResolver }}"  # noqa var-naming
matrix_bridge_mautrix_gvoice_container_labels_metrics_middleware_basic_auth_enabled: false
# See: https://doc.traefik.io/traefik/middlewares/http/basicauth/#users
matrix_bridge_mautrix_gvoice_container_labels_metrics_middleware_basic_auth_users: ''

# Controls whether labels will be added that expose mautrix-gvoice' HTTP API
# (used by tools like mautrix-manager for bridge login) at `https://<hostname><path_prefix>`.
matrix_bridge_mautrix_gvoice_container_labels_exposure_enabled: "{{ matrix_bridge_mautrix_gvoice_exposure_enabled }}"
matrix_bridge_mautrix_gvoice_container_labels_exposure_traefik_rule: "Host(`{{ matrix_bridge_mautrix_gvoice_exposure_hostname }}`) && PathPrefix(`{{ matrix_bridge_mautrix_gvoice_exposure_path_prefix }}`)"
matrix_bridge_mautrix_gvoice_container_labels_exposure_traefik_priority: 0
matrix_bridge_mautrix_gvoice_container_labels_exposure_traefik_entrypoints: "{{ matrix_bridge_mautrix_gvoice_container_labels_traefik_entrypoints }}"
matrix_bridge_mautrix_gvoice_container_labels_exposure_traefik_tls: "{{ matrix_bridge_mautrix_gvoice_container_labels_exposure_traefik_entrypoints != 'web' }}"
matrix_bridge_mautrix_gvoice_container_labels_exposure_traefik_tls_certResolver: "{{ matrix_bridge_mautrix_gvoice_container_labels_traefik_tls_certResolver }}"  # noqa var-naming

# matrix_bridge_mautrix_gvoice_container_labels_additional_labels contains a multiline string with additional labels to add to the container label file.
# See `../templates/labels.j2` for details.
#
# Example:
# matrix_bridge_mautrix_gvoice_container_labels_additional_labels: |
#   my.label=1
#   another.label="here"
matrix_bridge_mautrix_gvoice_container_labels_additional_labels: ''

# A list of extra arguments to pass to the container
matrix_bridge_mautrix_gvoice_container_extra_arguments: []

# List of systemd services that matrix-mautrix-gvoice.service depends on.
matrix_bridge_mautrix_gvoice_systemd_required_services_list: "{{ matrix_bridge_mautrix_gvoice_systemd_required_services_list_default + matrix_bridge_mautrix_gvoice_systemd_required_services_list_auto + matrix_bridge_mautrix_gvoice_systemd_required_services_list_custom }}"
matrix_bridge_mautrix_gvoice_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
matrix_bridge_mautrix_gvoice_systemd_required_services_list_auto: []
matrix_bridge_mautrix_gvoice_systemd_required_services_list_custom: []

# List of systemd services that matrix-mautrix-gvoice.service wants
matrix_bridge_mautrix_gvoice_systemd_wanted_services_list: []

matrix_bridge_mautrix_gvoice_appservice_token: ''
matrix_bridge_mautrix_gvoice_homeserver_token: ''

matrix_bridge_mautrix_gvoice_appservice_bot_username: gvoicebot

# Minimum severity of journal log messages.
# Valid values: fatal, error, warn, info, debug, trace
matrix_bridge_mautrix_gvoice_logging_level: 'warn'

# Whether or not created rooms should have federation enabled.
# If false, created portal rooms will never be federated.
matrix_bridge_mautrix_gvoice_federate_rooms: true

# Whether or not metrics endpoint should be enabled.
# Enabling them is usually enough for a local (in-container) Prometheus to consume them.
# If metrics need to be consumed by another (external) Prometheus server, consider exposing them via `matrix_bridge_mautrix_gvoice_metrics_proxying_enabled`.
matrix_bridge_mautrix_gvoice_metrics_enabled: false

# Controls whether metrics should be proxied (exposed) on a public URL.
matrix_bridge_mautrix_gvoice_metrics_proxying_enabled: false
matrix_bridge_mautrix_gvoice_metrics_proxying_hostname: ''
matrix_bridge_mautrix_gvoice_metrics_proxying_path_prefix: ''

# Controls whether mautrix-gvoice' HTTP API is exposed publicly (used by tools like mautrix-manager for bridge login).
matrix_bridge_mautrix_gvoice_exposure_enabled: false
matrix_bridge_mautrix_gvoice_exposure_hostname: ''
matrix_bridge_mautrix_gvoice_exposure_path_prefix: ''

# Database-related configuration fields.
#
# To use SQLite, stick to these defaults.
#
# To use Postgres:
# - change the engine (`matrix_bridge_mautrix_gvoice_database_engine: 'postgres'`)
# - adjust your database credentials via the `matrix_bridge_mautrix_gvoice_database_*` variables
matrix_bridge_mautrix_gvoice_database_engine: 'sqlite'

matrix_bridge_mautrix_gvoice_sqlite_database_path_local: "{{ matrix_bridge_mautrix_gvoice_data_path }}/mautrix-gvoice.db"
matrix_bridge_mautrix_gvoice_sqlite_database_path_in_container: "/data/mautrix-gvoice.db"

matrix_bridge_mautrix_gvoice_database_username: 'matrix_mautrix_gvoice'
matrix_bridge_mautrix_gvoice_database_password: 'some-password'
matrix_bridge_mautrix_gvoice_database_hostname: ''
matrix_bridge_mautrix_gvoice_database_port: 5432
matrix_bridge_mautrix_gvoice_database_name: 'matrix_mautrix_gvoice'
matrix_bridge_mautrix_gvoice_database_sslmode: disable

matrix_bridge_mautrix_gvoice_database_connection_string: 'postgresql://{{ matrix_bridge_mautrix_gvoice_database_username }}:{{ matrix_bridge_mautrix_gvoice_database_password }}@{{ matrix_bridge_mautrix_gvoice_database_hostname }}:{{ matrix_bridge_mautrix_gvoice_database_port }}/{{ matrix_bridge_mautrix_gvoice_database_name }}?sslmode={{ matrix_bridge_mautrix_gvoice_database_sslmode }}'

matrix_bridge_mautrix_gvoice_appservice_database_type: "{{ {
    'sqlite': 'sqlite3',
    'postgres': 'postgres',
}[matrix_bridge_mautrix_gvoice_database_engine] }}"

matrix_bridge_mautrix_gvoice_appservice_database_uri: "{{ {
    'sqlite': matrix_bridge_mautrix_gvoice_sqlite_database_path_in_container,
    'postgres': matrix_bridge_mautrix_gvoice_database_connection_string,
}[matrix_bridge_mautrix_gvoice_database_engine] }}"

matrix_bridge_mautrix_gvoice_double_puppet_secrets: "{{ matrix_bridge_mautrix_gvoice_double_puppet_secrets_auto | combine(matrix_bridge_mautrix_gvoice_double_puppet_secrets_custom) }}"
matrix_bridge_mautrix_gvoice_double_puppet_secrets_auto: {}
matrix_bridge_mautrix_gvoice_double_puppet_secrets_custom: {}

# Enable End-to-bridge encryption
matrix_bridge_mautrix_gvoice_bridge_encryption_allow: "{{ matrix_bridges_encryption_enabled }}"
matrix_bridge_mautrix_gvoice_bridge_encryption_default: "{{ matrix_bridges_encryption_default }}"
matrix_bridge_mautrix_gvoice_bridge_encryption_require: false
matrix_bridge_mautrix_gvoice_bridge_encryption_appservice: false
matrix_bridge_mautrix_gvoice_bridge_encryption_key_sharing_allow: "{{ matrix_bridge_mautrix_gvoice_bridge_encryption_allow }}"
matrix_bridge_mautrix_gvoice_bridge_encryption_pickle_key: mautrix.bridge.e2ee

matrix_bridge_mautrix_gvoice_network_displayname_template: "{% raw %}{{ or .Contact.Name .Name }}{% endraw %}"
matrix_bridge_mautrix_gvoice_appservice_username_template: "{% raw %}gvoice_{{.}}{% endraw %}"

matrix_bridge_mautrix_gvoice_public_media_signing_key: ''

# Shared secret for authentication of provisioning API requests.
# If set to "disable", the provisioning API will be disabled.
matrix_bridge_mautrix_gvoice_provisioning_shared_secret: disable

matrix_bridge_mautrix_gvoice_bridge_personal_filtering_spaces: true

matrix_bridge_mautrix_gvoice_bridge_permissions: |
  {{
    {'*': 'relay', matrix_bridge_mautrix_gvoice_homeserver_domain: 'user'}
    | combine({matrix_admin: 'admin'} if matrix_admin else {})
  }}

# Default mautrix-gvoice configuration template which covers the generic use case.
# You can customize it by controlling the various variables inside it.
#
# For a more advanced customization, you can extend the default (see `matrix_bridge_mautrix_gvoice_configuration_extension_yaml`)
# or completely replace this variable with your own template.
matrix_bridge_mautrix_gvoice_configuration_yaml: "{{ lookup('template', 'templates/config.yaml.j2') }}"

matrix_bridge_mautrix_gvoice_configuration_extension_yaml: |
  # Your custom YAML configuration goes here.
  # This configuration extends the default starting configuration (`matrix_bridge_mautrix_gvoice_configuration_yaml`).
  #
  # You can override individual variables from the default configuration, or introduce new ones.
  #
  # If you need something more special, you can take full control by
  # completely redefining `matrix_bridge_mautrix_gvoice_configuration_yaml`.

matrix_bridge_mautrix_gvoice_configuration_extension: "{{ matrix_bridge_mautrix_gvoice_configuration_extension_yaml | from_yaml if matrix_bridge_mautrix_gvoice_configuration_extension_yaml | from_yaml is mapping else {} }}"

# Holds the final configuration (a combination of the default and its extension).
# You most likely don't need to touch this variable. Instead, see `matrix_bridge_mautrix_gvoice_configuration_yaml`.
matrix_bridge_mautrix_gvoice_configuration: "{{ matrix_bridge_mautrix_gvoice_configuration_yaml | from_yaml | combine(matrix_bridge_mautrix_gvoice_configuration_extension, recursive=True) }}"

matrix_bridge_mautrix_gvoice_registration_yaml: |
  id: gvoice
  url: {{ matrix_bridge_mautrix_gvoice_appservice_address }}
  as_token: "{{ matrix_bridge_mautrix_gvoice_appservice_token }}"
  hs_token: "{{ matrix_bridge_mautrix_gvoice_homeserver_token }}"
  # See https://github.com/mautrix/signal/issues/43
  sender_localpart: _bot_{{ matrix_bridge_mautrix_gvoice_appservice_bot_username }}
  rate_limited: false
  namespaces:
      users:
      - regex: '^@gvoice_.+:{{ matrix_bridge_mautrix_gvoice_homeserver_domain | regex_escape }}$'
        exclusive: true
      - exclusive: true
        regex: '^@{{ matrix_bridge_mautrix_gvoice_appservice_bot_username | regex_escape }}:{{ matrix_bridge_mautrix_gvoice_homeserver_domain | regex_escape }}$'
  de.sorunome.msc2409.push_ephemeral: true
  receive_ephemeral: true
  io.element.msc4190: {{ matrix_bridge_mautrix_gvoice_msc4190_enabled | to_json }}

matrix_bridge_mautrix_gvoice_registration: "{{ matrix_bridge_mautrix_gvoice_registration_yaml | from_yaml }}"

# matrix_bridge_mautrix_gvoice_restart_necessary controls whether the service
# will be restarted (when true) or merely started (when false) by the
# systemd service manager role (when conditional restart is enabled).
#
# This value is automatically computed during installation based on whether
# any configuration files, the systemd service file, or the container image changed.
# The default of `false` means "no restart needed", appropriate when the role's
# installation tasks haven't run (e.g., due to --tags skipping them).
matrix_bridge_mautrix_gvoice_restart_necessary: false
