---

# Migrate from the old matrix-synapse-admin role.
# The service was renamed to matrix-ketesa. Stop and remove the old one.

- name: Check if matrix-synapse-admin.service exists
  ansible.builtin.stat:
    path: "{{ devture_systemd_docker_base_systemd_path }}/matrix-synapse-admin.service"
  register: matrix_ketesa_legacy_synapse_admin_service_stat

- name: Stop and remove legacy matrix-synapse-admin systemd service
  when: matrix_ketesa_legacy_synapse_admin_service_stat.stat.exists | bool
  block:
    - name: Ensure legacy matrix-synapse-admin service is stopped
      ansible.builtin.service:
        name: matrix-synapse-admin
        state: stopped
        enabled: false
      failed_when: false

    - name: Remove legacy matrix-synapse-admin service file
      ansible.builtin.file:
        path: "{{ devture_systemd_docker_base_systemd_path }}/matrix-synapse-admin.service"
        state: absent

    - name: Remove legacy matrix-synapse-admin data directory
      ansible.builtin.file:
        path: "{{ matrix_base_data_path }}/synapse-admin"
        state: absent

- name: Ensure matrix-ketesa paths exists
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: '0750'
    owner: "{{ matrix_user_name }}"
    group: "{{ matrix_group_name }}"
  with_items:
    - {path: "{{ matrix_ketesa_base_path }}", when: true}
    - {path: "{{ matrix_ketesa_config_path }}", when: true}
    - {path: "{{ matrix_ketesa_container_src_files_path }}", when: "{{ matrix_ketesa_container_image_self_build }}"}
  when: "item.when | bool"

- name: Ensure matrix-ketesa labels file is created
  ansible.builtin.template:
    src: "{{ role_path }}/templates/labels.j2"
    dest: "{{ matrix_ketesa_base_path }}/labels"
    owner: "{{ matrix_user_name }}"
    group: "{{ matrix_group_name }}"
    mode: '0640'
  register: matrix_ketesa_support_files_result

- name: Ensure matrix-ketesa configuration installed
  ansible.builtin.copy:
    content: "{{ matrix_ketesa_configuration | to_nice_json }}"
    dest: "{{ matrix_ketesa_config_path }}/config.json"
    mode: '0644'
    owner: "{{ matrix_user_name }}"
    group: "{{ matrix_group_name }}"
  register: matrix_ketesa_config_result

- name: Ensure matrix-ketesa image is pulled
  community.docker.docker_image:
    name: "{{ matrix_ketesa_container_image }}"
    source: "{{ 'pull' if ansible_version.major > 2 or ansible_version.minor > 7 else omit }}"
    force_source: "{{ matrix_ketesa_container_image_force_pull if ansible_version.major > 2 or ansible_version.minor >= 8 else omit }}"
    force: "{{ omit if ansible_version.major > 2 or ansible_version.minor >= 8 else matrix_ketesa_container_image_force_pull }}"
  when: not matrix_ketesa_container_image_self_build | bool
  register: matrix_ketesa_container_image_pull_result
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: matrix_ketesa_container_image_pull_result is not failed

- name: Ensure matrix-ketesa repository is present when self-building
  ansible.builtin.git:
    repo: "{{ matrix_ketesa_container_image_self_build_repo }}"
    dest: "{{ matrix_ketesa_container_src_files_path }}"
    version: "{{ matrix_ketesa_container_image.split(':')[1] }}"
    force: "yes"
  become: true
  become_user: "{{ matrix_user_name }}"
  register: matrix_ketesa_git_pull_results
  when: matrix_ketesa_container_image_self_build | bool

- name: Ensure matrix-ketesa Docker image is built
  community.docker.docker_image:
    name: "{{ matrix_ketesa_container_image }}"
    source: build
    force_source: "{{ matrix_ketesa_git_pull_results.changed if ansible_version.major > 2 or ansible_version.minor >= 8 else omit }}"
    force: "{{ omit if ansible_version.major > 2 or ansible_version.minor >= 8 else matrix_ketesa_git_pull_results.changed }}"
    build:
      dockerfile: Dockerfile
      path: "{{ matrix_ketesa_container_src_files_path }}"
      pull: true
  when: matrix_ketesa_container_image_self_build | bool

- name: Ensure matrix-ketesa container network is created
  community.general.docker_network:
    enable_ipv6: "{{ devture_systemd_docker_base_ipv6_enabled }}"
    name: "{{ matrix_ketesa_container_network }}"
    driver: bridge
    driver_options: "{{ devture_systemd_docker_base_container_networks_driver_options }}"

- name: Ensure matrix-ketesa.service installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/matrix-ketesa.service.j2"
    dest: "{{ devture_systemd_docker_base_systemd_path }}/matrix-ketesa.service"
    mode: '0644'
  register: matrix_ketesa_systemd_service_result

- name: Determine whether Ketesa needs a restart
  ansible.builtin.set_fact:
    matrix_ketesa_restart_necessary: >-
      {{
        matrix_ketesa_support_files_result.changed | default(false)
        or matrix_ketesa_config_result.changed | default(false)
        or matrix_ketesa_systemd_service_result.changed | default(false)
        or matrix_ketesa_container_image_pull_result.changed | default(false)
      }}
