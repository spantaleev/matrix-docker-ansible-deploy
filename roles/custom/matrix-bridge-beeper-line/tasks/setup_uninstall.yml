---

- name: Check existence of matrix-beeper-line service
  ansible.builtin.stat:
    path: "{{ devture_systemd_docker_base_systemd_path }}/matrix-beeper-line.service"
  register: matrix_bridge_beeper_line_service_stat

- when: matrix_bridge_beeper_line_service_stat.stat.exists | bool
  block:
    - name: Ensure matrix-beeper-line is stopped
      ansible.builtin.service:
        name: matrix-beeper-line
        state: stopped
        enabled: false
        daemon_reload: true

    - name: Ensure matrix-beeper-line.service doesn't exist
      ansible.builtin.file:
        path: "{{ devture_systemd_docker_base_systemd_path }}/matrix-beeper-line.service"
        state: absent
